name: Profile Summary Cards

on:
  # Refresh twice a day
  schedule:
    - cron: "0 */12 * * *"
  # Allow manual runs from the Actions tab
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-profile-summary-cards
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          # Use a Personal Access Token (repo scope) so PRIVATE repositories are
          # included in the language/stats cards. Falls back to the default token
          # (public-only) until the SUMMARY_CARDS_PAT secret is added.
          GITHUB_TOKEN: ${{ secrets.SUMMARY_CARDS_PAT || secrets.GITHUB_TOKEN }}
        with:
          USERNAME: ${{ github.repository_owner }}
          BRANCH_NAME: "main"
          UTC_OFFSET: 2
          AUTO_PUSH: true
